  <script>
    // [NUCLEAR PWA KILLER] Unconditionally unregister all service workers and clear caches
    // This guarantees that the persistent v11 cache on users' devices is wiped out.
    (function() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          if (registrations.length > 0) {
            console.warn('[PWA] Found active Service Workers. Unregistering to force update to v12...');
            
            // Clear all CacheStorage
            if ('caches' in window) {
              caches.keys().then(function(names) {
                names.forEach(function(name) { caches.delete(name); });
              });
            }

            // Unregister all SWs
            var unregisterPromises = registrations.map(function(reg) {
              return reg.unregister();
            });

            // Reload page once all SWs are dead
            Promise.all(unregisterPromises).then(function() {
              console.warn('[PWA] Service Workers purged. Reloading page...');
              window.location.reload(true);
            });
          } else {
            console.log('[PWA] No Service Workers found. Safe to proceed.');
          }
        });
      }
    })();
  </script>

  <script>
    // 경로에 따른 PWA 설정 동적 변경 로직
    (function () {
      var path = window.location.pathname;
      var manifestFile = '/manifest-checkin.json';
      var appTitle = '복샘요가 출석체크';

      if (path.indexOf('/admin') === 0) {
        manifestFile = '/manifest-admin.json';
        appTitle = '복샘요가 관리자';
      } else if (path.indexOf('/member') === 0) {
        manifestFile = '/manifest-member.json';
        appTitle = '내요가 (복샘요가)';
      } else if (path.indexOf('/instructor') === 0) {
        manifestFile = '/manifest-instructor.json';
        appTitle = '복샘요가 선생님';
      }

      // Manifest 주입
      var link = document.createElement('link');
      link.rel = 'manifest';
      link.href = manifestFile;
      document.head.appendChild(link);

      // iOS Title 및 일반 Title 주입
      var metaTitle = document.createElement('meta');
      metaTitle.name = 'apple-mobile-web-app-title';
      metaTitle.content = appTitle;
      document.head.appendChild(metaTitle);

      document.title = appTitle;
    })();
  </script>
