<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <meta name="google" content="notranslate" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#08080A" />
  <link rel="apple-touch-icon" href="/logo_circle_white.webp">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- SEO & Open Graph — 기본값은 PassFlow Ai (SaaS 플랫폼 도메인) -->
  <meta name="description" content="PassFlow Ai — AI 기반 스튜디오 운영 솔루션">
  <meta property="og:type" content="website">
  <meta property="og:title" content="PassFlow Ai">
  <meta property="og:description" content="AI가 함께하는 스튜디오 운영. 출석·매출·회원 관리를 하나로.">
  <meta property="og:image" content="/assets/passflow_logo.png">
  <meta property="og:site_name" content="PassFlow Ai">
  <meta property="og:locale" content="ko_KR">

  <script>
    // 도메인 기반 PWA 설정 + OG 메타태그 동적 변경
    (function () {
      var path = window.location.pathname;
      var host = window.location.hostname;
      
      var brandName = '스튜디오';
      var ogImage = '/pwa-icon-512.png';
      var ogDesc = '간편하게 출석하고 수련을 기록해보세요.';

      if (host.indexOf('boksaem') !== -1) {
        brandName = '복샘요가';
        ogImage = '/pwa-icon-512.png';
        ogDesc = '복샘요가 출석·수련 기록 서비스';
      } else if (host.indexOf('ssangmun') !== -1) {
        brandName = '쌍문요가';
        ogImage = '/pwa-icon-512.png';
        ogDesc = '쌍문요가 출석·수련 기록 서비스';
      } else if (host.indexOf('demo') !== -1 || host.indexOf('passflow') !== -1) {
        brandName = 'PassFlow Ai';
        ogImage = '/assets/passflow_logo.png';
        ogDesc = 'AI가 함께하는 스튜디오 운영. 출석·매출·회원 관리를 하나로.';
      }

      var manifestFile = '/manifest-checkin.json';
      var appTitle = brandName + ' 출석체크';

      if (path.indexOf('/admin') === 0) {
        manifestFile = '/manifest-admin.json';
        appTitle = brandName + ' 관리자';
      } else if (path.indexOf('/member') === 0) {
        manifestFile = '/manifest-member.json';
        appTitle = '내요가 (' + brandName + ')';
      } else if (path.indexOf('/instructor') === 0) {
        manifestFile = '/manifest-instructor.json';
        appTitle = brandName + ' 선생님';
      } else if (path.indexOf('/onboarding') === 0) {
        appTitle = brandName + ' 시작하기';
      } else if (path.indexOf('/features') === 0) {
        appTitle = brandName + ' 둘러보기';
      } else if (path.indexOf('/demo') === 0) {
        appTitle = brandName + ' 데모 체험';
      } else if (path === '/' || path === '' || path === '/index.html') {
        appTitle = brandName;
      } else {
        appTitle = brandName; // fallback for unmatched paths instead of attendance check
      }

      // Manifest 주입
      var link = document.createElement('link');
      link.rel = 'manifest';
      link.href = manifestFile;
      document.head.appendChild(link);

      // iOS Title 및 일반 Title 주입
      var metaTitle = document.createElement('meta');
      metaTitle.name = 'apple-mobile-web-app-title';
      metaTitle.content = appTitle;
      document.head.appendChild(metaTitle);

      document.title = appTitle;

      // OG 메타태그 동적 교체 (브라우저 내 렌더링용)
      var ogTitleEl = document.querySelector('meta[property="og:title"]');
      var ogDescEl = document.querySelector('meta[property="og:description"]');
      var ogImageEl = document.querySelector('meta[property="og:image"]');
      var ogSiteEl = document.querySelector('meta[property="og:site_name"]');
      var descEl = document.querySelector('meta[name="description"]');
      if (ogTitleEl) ogTitleEl.content = appTitle;
      if (ogDescEl) ogDescEl.content = ogDesc;
      if (ogImageEl) ogImageEl.content = ogImage;
      if (ogSiteEl) ogSiteEl.content = brandName;
      if (descEl) descEl.content = ogDesc;
    })();
  </script>
<style>
  /* Reset some defaults for clean start */
  body { background-color: #08080A; }
</style>
  <title>Studio</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
